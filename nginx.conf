server {
    listen 80;
    server_name mdi.yourteam.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mdi.yourteam.com;

    ssl_certificate     /etc/letsencrypt/live/mdi.yourteam.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mdi.yourteam.com/privkey.pem;

    # HTTP → Next.js
    location / {
        proxy_pass         http://mdi:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # SSE (keep-alive 필수)
    location /api/events {
        proxy_pass         http://mdi:3001;
        proxy_http_version 1.1;
        proxy_set_header   Connection '';
        proxy_set_header   Cache-Control 'no-cache';
        proxy_buffering    off;
        proxy_read_timeout 86400s;
    }

    # WebSocket Upgrade
    location /ws {
        proxy_pass         http://mdi:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 86400s;
    }
}
