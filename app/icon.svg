<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>
  <!-- Bar chart: left tall bar -->
  <rect x="5" y="10" width="6" height="16" rx="2" fill="#6366f1"/>
  <!-- Bar chart: center medium bar -->
  <rect x="13" y="15" width="6" height="11" rx="2" fill="#818cf8"/>
  <!-- Bar chart: right short bar -->
  <rect x="21" y="19" width="6" height="7" rx="2" fill="#a5b4fc"/>
  <!-- Top line accent -->
  <rect x="5" y="6" width="22" height="2" rx="1" fill="#4f46e5" opacity="0.5"/>
</svg>
